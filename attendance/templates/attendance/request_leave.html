{% extends 'base.html' %}
{% block title %}PulseTrack | Request Leave{% endblock %}
{% block content %}
<section class="card reveal form-card">
  <p class="eyebrow">Employee Portal</p>
  <h2>Request Leave</h2>
  <form method="post" class="form-stack">
    {% csrf_token %}

    <label for="leave_type">Leave Type</label>
    <select id="leave_type" name="leave_type">
      {% for leave_type in leave_types %}
        <option value="{{ leave_type }}">{{ leave_type }}</option>
      {% endfor %}
    </select>

    <label for="start_date">Start Date</label>
    <input id="start_date" name="start_date" type="date" required>

    <label for="end_date">End Date</label>
    <input id="end_date" name="end_date" type="date" required>

    <label for="reason">Reason</label>
    <textarea id="reason" name="reason" rows="4" placeholder="Optional details"></textarea>

    <div class="row-gap">
      <button class="btn btn-primary" type="submit">Submit Request</button>
      <a class="btn btn-soft" href="{% url 'attendance:portal' %}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
